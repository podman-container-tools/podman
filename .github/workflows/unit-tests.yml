---

name: unit tests

on:
  pull_request:
    # Mirror Cirrus's only_if for unit_test_task: run when source/build
    # files change, but not when the only Go changes are under e2e
    # directories. The trailing **_test.go re-include keeps the Cirrus
    # behavior where any _test.go change (including under e2e) triggers.
    paths:
      - '**.go'
      - '**.c'
      - '**.h'
      - Makefile
      - vendor/**
      - test/tools/**
      - test/registries*.conf
      - hack/**
      - version/rawversion/*
      - .github/workflows/unit-tests.yml
      - '!test/e2e/**'
      - '!pkg/machine/e2e/**'
      - '**_test.go'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ubuntu-rootful:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
              libapparmor-dev libbtrfs-dev libdevmapper-dev libgpgme-dev \
              libseccomp-dev libsubid-dev libsystemd-dev pkg-config

      - name: Run unit tests as root
        run: sudo -E env "PATH=$PATH" make localunit

  ubuntu-rootless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
              libapparmor-dev libbtrfs-dev libdevmapper-dev libgpgme-dev \
              libseccomp-dev libsubid-dev libsystemd-dev pkg-config

      - name: Run unit tests
        run: make localunit
