---

name: unit tests

on:
  pull_request:
    # Mirror Cirrus's only_if for unit_test_task: run when source/build
    # files change, but not when the only Go changes are under e2e
    # directories. The trailing **_test.go re-include keeps the Cirrus
    # behavior where any _test.go change (including under e2e) triggers.
    paths:
      - '**.go'
      - '**.c'
      - '**.h'
      - Makefile
      - vendor/**
      - test/tools/**
      - test/registries*.conf
      - hack/**
      - version/rawversion/*
      - .github/workflows/unit-tests.yml
      - '!test/e2e/**'
      - '!pkg/machine/e2e/**'
      - '**_test.go'
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ubuntu-rootful:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
              libapparmor-dev libbtrfs-dev libdevmapper-dev libgpgme-dev \
              libseccomp-dev libsubid-dev libsystemd-dev pkg-config

      - name: Install test registries.conf
        # Ubuntu ships a v1 /etc/containers/registries.conf via docker;
        # podman needs v2.
        run: sudo install -D -m 644 test/registries.conf /etc/containers/registries.conf

      - name: Remove runner's docker credentials
        # The runner user has ~/.docker/config.json with the
        # 'githubactions' registry token. pkg/auth tests that exercise
        # the default auth-file fallback (sys=nil path) pick that up
        # unexpectedly. sudo -E on this runner preserves $HOME, so the
        # rootful job sees the same creds.
        run: rm -f ~/.docker/config.json

      - name: Run unit tests as root
        run: sudo -E env "PATH=$PATH" make localunit

  ubuntu-rootless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
              libapparmor-dev libbtrfs-dev libdevmapper-dev libgpgme-dev \
              libseccomp-dev libsubid-dev libsystemd-dev pkg-config

      - name: Install test registries.conf
        # Ubuntu ships a v1 /etc/containers/registries.conf via docker;
        # podman needs v2.
        run: sudo install -D -m 644 test/registries.conf /etc/containers/registries.conf

      - name: Remove runner's docker credentials
        # The runner user has ~/.docker/config.json with the
        # 'githubactions' registry token. pkg/auth tests that exercise
        # the default auth-file fallback (sys=nil path) pick that up
        # unexpectedly. sudo -E on this runner preserves $HOME, so the
        # rootful job sees the same creds.
        run: rm -f ~/.docker/config.json

      - name: Run unit tests
        run: make localunit

  fedora-rootful:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: lima-vm/lima-actions/setup@55627e31b78637bf254a8b2a14da8ea7d12564e5 # v1.1.0
        id: lima

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima.outputs.version }}-fedora

      - name: Start Fedora VM
        run: limactl start --plain --name=default template:fedora

      - name: Copy source into VM
        run: limactl cp -r . default:/tmp/podman

      - name: Install build deps in VM
        run: |
          lima sudo dnf install -y \
              btrfs-progs-devel device-mapper-devel gpgme-devel \
              libassuan-devel libseccomp-devel \
              shadow-utils-subid-devel systemd-devel \
              gcc golang make pkg-config \
              qemu-system-x86-core

      - name: Run unit tests as root
        run: lima sudo make -C /tmp/podman localunit

  fedora-rootless:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: lima-vm/lima-actions/setup@55627e31b78637bf254a8b2a14da8ea7d12564e5 # v1.1.0
        id: lima

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima.outputs.version }}-fedora

      - name: Start Fedora VM
        run: limactl start --plain --name=default template:fedora

      - name: Copy source into VM
        run: limactl cp -r . default:/tmp/podman

      - name: Install build deps in VM
        run: |
          lima sudo dnf install -y \
              btrfs-progs-devel device-mapper-devel gpgme-devel \
              libassuan-devel libseccomp-devel \
              shadow-utils-subid-devel systemd-devel \
              gcc golang make pkg-config \
              qemu-system-x86-core

      - name: Run unit tests
        run: lima make -C /tmp/podman localunit
