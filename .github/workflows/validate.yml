---

name: validate

on:
  pull_request:

permissions:
  contents: read

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: PR removes fixed skips
        uses: ./.github/actions/pr-removes-fixed-skips
        with:
          pr-body: ${{ github.event.pull_request.body }}
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}

      - name: PR should include tests
        if: always()
        uses: ./.github/actions/pr-should-include-tests
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          override: ${{ contains(github.event.pull_request.labels.*.name, 'No New Tests') }}

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: install shellcheck
        env:
          VERSION: v0.11.0
          BASEURL: https://github.com/koalaman/shellcheck/releases/download
          SHA256: 4da528ddb3a4d1b7b24a59d4e16eb2f5fd960f4bd9a3708a15baddbdf1d5a55b
        run: |
          mkdir ~/bin
          curl -sSfL --retry 5 $BASEURL/$VERSION/shellcheck-$VERSION.linux.x86_64.tar.xz |
            tar xfJ - -C ~/bin --strip 1 shellcheck-$VERSION/shellcheck
          sha256sum --strict --check - <<<"$SHA256 *$HOME/bin/shellcheck"
          # make sure to remove the old version
          sudo rm -f /usr/bin/shellcheck
          # Add ~/bin to $PATH.
          echo ~/bin >> $GITHUB_PATH

      - name: Run shellcheck
        run: |
          shellcheck --format=tty --wiki-link-count=0 --severity=warning \
              contrib/cirrus/*.sh \
              .github/actions/check_cirrus_cron/* \
              hack/get_ci_vm.sh

  tests-expect-exit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check for unannotated Expect(ExitCode())
        run: |
          if grep -E --line-number 'Expect.*ExitCode' test/e2e/*.go | grep -E -v ', ".*"\)'; then
            echo "^^^ Unhelpful use of Expect(ExitCode())"
            echo "   Please use '.Should(Exit(...))' pattern instead."
            echo "   If that's not possible, please add an annotation (description) to your assertion:"
            echo '        Expect(...).To(..., "Friendly explanation of this check")'
            exit 1
          fi

  swagger-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run swagger-check
        run: hack/swagger-check

  no-leading-tabs-in-system-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # TODO: replace this narrow grep with `shfmt -ln bats -d test/system/`
      # once the existing files are reformatted to satisfy shfmt.
      - name: Check for leading tabs in system tests
        run: |
          if grep -n $'^\t' test/system/*; then
            echo "Found leading tabs in system tests. Use spaces to indent, not tabs." >&2
            exit 1
          fi
