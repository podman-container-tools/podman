---

name: validate

on:
  pull_request:

permissions:
  contents: read

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: PR removes fixed skips
        uses: ./.github/actions/pr-removes-fixed-skips
        with:
          pr-body: ${{ github.event.pull_request.body }}
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}

      - name: PR should include tests
        if: always()
        uses: ./.github/actions/pr-should-include-tests
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          override: ${{ contains(github.event.pull_request.labels.*.name, 'No New Tests') }}

  no-leading-tabs-in-system-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # TODO: replace this narrow grep with `shfmt -ln bats -d test/system/`
      # once the existing files are reformatted to satisfy shfmt.
      - name: Check for leading tabs in system tests
        run: |
          if grep -n $'^\t' test/system/*; then
            echo "Found leading tabs in system tests. Use spaces to indent, not tabs." >&2
            exit 1
          fi
